<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pharmacy RBAC Simulator</title>
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        .input-field:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- MOCK DATA ---
        const USERS = [
            {email: 'admin', pass: '123', name: 'Priya', role: 'Manager'},
            {email: 'user', pass: '123', name: 'Rahul', role: 'Customer'}
        ];

        const ALERTS = {
            lowStock: [
                {name: 'Amoxicillin', qty: 12}, 
                {name: 'Ibuprofen', qty: 5}
            ],
            expiry: [
                {name: 'Cough Syrup', date: '2026-05-15', msg: 'Expiring in 5 days'}
            ]
        };

        const HISTORY = [
            {date: '2026-05-10', medicine: 'Paracetamol', qty: 2, subtotal: 100, total: 220}, 
            {date: '2026-04-22', medicine: 'Vitamin C', qty: 1, subtotal: 150, total: 150}
        ];

        // --- COMPONENTS ---
        
        function Login({ onLogin }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                const user = USERS.find(u => u.email === email && u.pass === password);
                if (user) {
                    setError('');
                    onLogin(user);
                } else {
                    setError('Invalid credentials. Please check the helper text and try again.');
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass-card p-8 w-full max-w-md">
                        <div className="text-center mb-8">
                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-500/20 text-indigo-400 mb-4">
                                <i data-lucide="pill" className="w-8 h-8"></i>
                            </div>
                            <h1 className="text-2xl font-bold text-white tracking-tight">Nexus Pharmacy</h1>
                            <p className="text-slate-400 mt-2">Sign in to your account</p>
                        </div>

                        {error && (
                            <div className="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded mb-6 flex items-start gap-3">
                                <i data-lucide="alert-circle" className="w-5 h-5 flex-shrink-0 mt-0.5"></i>
                                <span className="text-sm">{error}</span>
                            </div>
                        )}

                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
                                <input 
                                    type="text" 
                                    value={email}
                                    onChange={e => setEmail(e.target.value)}
                                    className="input-field w-full px-4 py-2.5 rounded-lg transition-all"
                                    placeholder="Enter your email"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                                <input 
                                    type="password" 
                                    value={password}
                                    onChange={e => setPassword(e.target.value)}
                                    className="input-field w-full px-4 py-2.5 rounded-lg transition-all"
                                    placeholder="Enter your password"
                                />
                            </div>
                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 rounded-lg transition-colors shadow-lg shadow-indigo-500/30 flex justify-center items-center gap-2">
                                Sign In <i data-lucide="arrow-right" className="w-4 h-4"></i>
                            </button>
                        </form>

                        <div className="mt-8 bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                            <h3 className="text-sm font-semibold text-slate-300 mb-3 flex items-center gap-2">
                                <i data-lucide="info" className="w-4 h-4 text-blue-400"></i> Mock Credentials
                            </h3>
                            <div className="space-y-2 text-sm">
                                <div className="flex justify-between items-center pb-2 border-b border-slate-700">
                                    <span className="text-slate-400">Manager:</span>
                                    <code className="bg-slate-900 px-2 py-1 rounded text-emerald-400">admin / 123</code>
                                </div>
                                <div className="flex justify-between items-center pt-1">
                                    <span className="text-slate-400">Customer:</span>
                                    <code className="bg-slate-900 px-2 py-1 rounded text-emerald-400">user / 123</code>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function ManagerDashboard({ user, onLogout }) {
            return (
                <div className="max-w-6xl mx-auto p-6 animate-[fadeIn_0.3s_ease-out]">
                    <header className="flex justify-between items-center mb-10 pb-6 border-b border-slate-800">
                        <div>
                            <h1 className="text-3xl font-bold text-white tracking-tight">Manager Dashboard</h1>
                            <p className="text-slate-400 mt-1">Welcome back, {user.name}!</p>
                        </div>
                        <button onClick={onLogout} className="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-lg transition-colors border border-slate-700">
                            <i data-lucide="log-out" className="w-4 h-4"></i> Logout
                        </button>
                    </header>

                    <div className="grid md:grid-cols-2 gap-6">
                        {/* Low Stock Alerts */}
                        <div className="glass-card p-6 border-l-4 border-l-amber-500">
                            <div className="flex items-center gap-3 mb-6">
                                <div className="p-2 bg-amber-500/20 text-amber-400 rounded-lg">
                                    <i data-lucide="alert-triangle" className="w-6 h-6"></i>
                                </div>
                                <h2 className="text-xl font-bold text-white">Low Stock Alerts</h2>
                            </div>
                            <div className="space-y-3">
                                {ALERTS.lowStock.map((item, i) => (
                                    <div key={i} className="flex justify-between items-center bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                                        <div className="flex items-center gap-3">
                                            <i data-lucide="package" className="w-5 h-5 text-slate-400"></i>
                                            <span className="font-medium text-slate-200">{item.name}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-sm text-slate-400">Qty remaining:</span>
                                            <span className="font-bold text-amber-400 bg-amber-500/10 px-2 py-1 rounded">{item.qty}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Expiry Alerts */}
                        <div className="glass-card p-6 border-l-4 border-l-red-500">
                            <div className="flex items-center gap-3 mb-6">
                                <div className="p-2 bg-red-500/20 text-red-400 rounded-lg">
                                    <i data-lucide="clock" className="w-6 h-6"></i>
                                </div>
                                <h2 className="text-xl font-bold text-white">Expiring Soon</h2>
                            </div>
                            <div className="space-y-3">
                                {ALERTS.expiry.map((item, i) => (
                                    <div key={i} className="flex flex-col gap-2 bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                                        <div className="flex justify-between items-start">
                                            <div className="flex items-center gap-3">
                                                <i data-lucide="calendar" className="w-5 h-5 text-slate-400"></i>
                                                <span className="font-medium text-slate-200">{item.name}</span>
                                            </div>
                                            <span className="text-xs font-semibold uppercase tracking-wider text-red-400 bg-red-500/10 px-2 py-1 rounded">Action Required</span>
                                        </div>
                                        <div className="ml-8 text-sm text-slate-400">
                                            <p>Expiry Date: <span className="text-slate-300 font-medium">{item.date}</span></p>
                                            <p className="text-red-400 mt-1 flex items-center gap-1">
                                                <i data-lucide="info" className="w-3 h-3"></i> {item.msg}
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function CustomerDashboard({ user, onLogout }) {
            return (
                <div className="max-w-6xl mx-auto p-6 animate-[fadeIn_0.3s_ease-out]">
                    <header className="flex justify-between items-center mb-10 pb-6 border-b border-slate-800">
                        <div>
                            <h1 className="text-3xl font-bold text-white tracking-tight">Customer Dashboard</h1>
                            <p className="text-slate-400 mt-1">Welcome back, {user.name}!</p>
                        </div>
                        <button onClick={onLogout} className="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-lg transition-colors border border-slate-700">
                            <i data-lucide="log-out" className="w-4 h-4"></i> Logout
                        </button>
                    </header>

                    <div className="glass-card overflow-hidden border border-slate-700">
                        <div className="p-6 bg-slate-800/40 border-b border-slate-700 flex items-center gap-3">
                            <i data-lucide="history" className="w-6 h-6 text-indigo-400"></i>
                            <h2 className="text-xl font-bold text-white">Purchase History</h2>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-800/80">
                                        <th className="px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider border-b border-slate-700">Date</th>
                                        <th className="px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider border-b border-slate-700">Medicine</th>
                                        <th className="px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider border-b border-slate-700 text-center">Qty</th>
                                        <th className="px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider border-b border-slate-700 text-right">Total Paid</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800">
                                    {HISTORY.map((item, i) => (
                                        <tr key={i} className="hover:bg-slate-800/30 transition-colors">
                                            <td className="px-6 py-4 whitespace-nowrap text-slate-300">
                                                <div className="flex items-center gap-2">
                                                    <i data-lucide="calendar" className="w-4 h-4 text-slate-500"></i>
                                                    {item.date}
                                                </div>
                                            </td>
                                            <td className="px-6 py-4 font-medium text-white">
                                                {item.medicine}
                                            </td>
                                            <td className="px-6 py-4 text-center text-slate-300">
                                                <span className="bg-slate-800 px-2.5 py-1 rounded text-sm">{item.qty}</span>
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-right">
                                                <span className="text-emerald-400 font-bold text-lg">₹{item.total}</span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [currentUser, setCurrentUser] = useState(null);

            // Re-initialize icons when component renders
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            if (!currentUser) {
                return <Login onLogin={setCurrentUser} />;
            }

            if (currentUser.role === 'Manager') {
                return <ManagerDashboard user={currentUser} onLogout={() => setCurrentUser(null)} />;
            }

            return <CustomerDashboard user={currentUser} onLogout={() => setCurrentUser(null)} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
